<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Authentication Required</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { text-align: center; background: #0a0a0a; padding: 40px; border: 1px solid #222; border-radius: 8px; }
        input[type="password"] { background: #111; border: 1px solid #333; color: white; padding: 12px; width: 260px; font-size: 1rem; text-align: center; border-radius: 4px; margin-bottom: 15px; }
        button { background: #fff; color: #000; border: none; padding: 12px 25px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .error { color: #ff3333; font-weight: bold; margin-bottom: 15px; }
        #redirect-container { color: #ff3333; font-weight: bold; margin-top: 15px; display: none; background: #1a0000; padding: 10px; border: 1px solid #550000; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Enter Verification Pin</h2>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="POST">
            <input type="password" name="password" placeholder="•••••••••••••" autocomplete="off" autofocus><br>
            <button type="submit">Verify Device</button>
        </form>
        <div id="redirect-container">Site is currently closed. Redirecting to shutdown screen in <span id="timer">5</span>s...</div>
    </div>
    <script>
        window.onload = function() {
            fetch('/system-status').then(res => res.json()).then(data => {
                if (data.status === 'shutdown') {
                    document.getElementById('redirect-container').style.display = 'block';
                    let count = 5;
                    setInterval(() => {
                        count--; document.getElementById('timer').innerText = count;
                        if (count <= 0) window.location.href = "/maintenance";
                    }, 1000);
                }
            });
        }
    </script>
</body>
</html>
